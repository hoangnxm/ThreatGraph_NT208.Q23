server {
    listen 80;
    server_name threatgraph.me www.threatgraph.me;
    return 301 https://$host$request_uri;
}

# Cấu hình HTTPS chính
server {
    listen 443 ssl;
    server_name threatgraph.me www.threatgraph.me;

    ssl_certificate /etc/letsencrypt/live/threatgraph.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/threatgraph.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend React
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # HTTPS cho API Backend
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}